<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dress Us</title>
    <link rel="stylesheet" href="./style_dressing.css">
</head>
<body>
    <div class="start" id="start">
        <h1>Dress Us</h1>
        <p>click to start</p>
    </div>
    <div class="navbar">
        <h3>Sofia</h3>
        <button id="girl_hair_btn">
            <img src="./dress_img/hair_btn.png" alt="">
        </button>
        <button id="girl_top_btn">
            <img src="./dress_img/tshirt_btn.png" alt="">
        </button>
        <button id="girl_bott_btn">
            <img src="./dress_img/pants_btn.png" alt="">
        </button>
    </div>
    <main>
        <div class="heroes">
            <div class="people">
                <div class="shadow"></div>
                <img src="./dress_img/girl.png" alt="" class="girl">
                
                <img src="./dress_img/girl_bott1.png" alt="" class="girl" id="girl_bott">
                <img src="./dress_img/girl_top1.png" alt="" class="girl" id="girl_top">
                <img src="./dress_img/girl_hair1.png" alt="" class="girl" id="girl_hair">
                
            </div>
            <div class="people me">
                <div class="shadow"></div>
                <img src="./dress_img/boy.png" alt="" class="boy">
                
                <img src="./dress_img/boy_bott1.png" alt="" class="boy" id="boy_bott">
                <img src="./dress_img/boy_top1.png" alt="" class="boy" id="boy_top">
                <img src="./dress_img/boy_hair1.png" alt="" class="boy" id="boy_hair">
            </div>
        </div>
    </main>
    <div class="navbar">
        <h3>Taras</h3>
        <button id="boy_hair_btn">
            <img src="./dress_img/hair_btn.png" alt="">
        </button>
        <button id="boy_top_btn">
            <img src="./dress_img/tshirt_btn.png" alt="">
        </button>
        <button id="boy_bott_btn">
            <img src="./dress_img/pants_btn.png" alt="">
        </button>
    </div>

    <div class="popover">
        <div class="wrap">
            <div class="wrap_head">
                <h2 id="popover_title"></h2>
            </div>
            <div class="wrap_items"></div>
        </div>
    </div>

    <script src="./script_dressing.js"></script>
</body>
</html>
